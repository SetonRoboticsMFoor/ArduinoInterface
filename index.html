<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arduino LED Controller</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background-color: #f4f4f9;
    }
    button {
      padding: 15px 25px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
    }
    .connect-btn { background-color: #008CBA; color: white; }
    .on-btn { background-color: #4CAF50; color: white; }
    .off-btn { background-color: #f44336; color: white; }
    button:disabled { background-color: #cccccc; cursor: not-allowed; }
  </style>
</head>
<body>

  <h1>Arduino LED Web Control</h1>
  
  <button id="connectBtn" class="connect-btn">Connect to Arduino</button>
  <br><br>
  <button id="onBtn" class="on-btn" disabled>Turn LED ON</button>
  <button id="offBtn" class="off-btn" disabled>Turn LED OFF</button>

  <script>
    let port;
    let writer;

    const connectBtn = document.getElementById('connectBtn');
    const onBtn = document.getElementById('onBtn');
    const offBtn = document.getElementById('offBtn');

    // Connect to Serial Port
    connectBtn.addEventListener('click', async () => {
      if ('serial' in navigator) {
        try {
          // Prompt user to select an Arduino serial port
          port = await navigator.serial.requestPort();
          await port.open({ baudRate: 9600 });

          const textEncoder = new TextEncoderStream();
          const writableStreamClosed = textEncoder.readable.pipeTo(port.writable);
          writer = textEncoder.writable.getWriter();

          alert('Connected to Arduino successfully!');
          onBtn.disabled = false;
          offBtn.disabled = false;
          connectBtn.disabled = true;
        } catch (err) {
          console.error('Error connecting to serial port:', err);
          alert('Failed to connect: ' + err.message);
        }
      } else {
        alert('Web Serial API is not supported in your browser. Please use Google Chrome, Microsoft Edge, or Opera.');
      }
    });

    // Send command to turn LED ON
    onBtn.addEventListener('click', async () => {
      if (writer) {
        await writer.write('1');
      }
    });

    // Send command to turn LED OFF
    offBtn.addEventListener('click', async () => {
      if (writer) {
        await writer.write('0');
      }
    });
  </script>
</body>
</html>
