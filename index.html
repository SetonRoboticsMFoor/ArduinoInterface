<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arduino LED Control Panel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background-color: #f4f4f9;
    }
    .container {
      max-width: 420px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    button {
      padding: 12px 20px;
      font-size: 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;
    }
    .connect-btn { background-color: #008CBA; color: white; }
    .disconnect-btn { background-color: #777777; color: white; }
    .on-btn { background-color: #4CAF50; color: white; }
    .off-btn { background-color: #f44336; color: white; }
    button:disabled { background-color: #cccccc; cursor: not-allowed; }
    
    .control-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }
    .slider-container {
      margin-top: 20px;
    }
    input[type=range] {
      width: 80%;
      margin: 15px 0;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>LED Control Panel</h1>
    
    <div>
      <button id="connectBtn" class="connect-btn">Connect</button>
      <button id="disconnectBtn" class="disconnect-btn" disabled>Disconnect</button>
    </div>

    <div class="control-section">
      <button id="onBtn" class="on-btn" disabled>Turn ON</button>
      <button id="offBtn" class="off-btn" disabled>Turn OFF</button>

      <div class="slider-container">
        <label for="brightnessSlider"><strong>Brightness: <span id="valDisplay">255</span></strong></label><br>
        <input type="range" id="brightnessSlider" min="1" max="255" value="255" disabled>
      </div>
    </div>
  </div>

  <script>
    let port;
    let writer;
    let textEncoder;
    let writableStreamClosed;

    let isLedOn = false; // Tracks whether the LED is currently ON

    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const onBtn = document.getElementById('onBtn');
    const offBtn = document.getElementById('offBtn');
    const slider = document.getElementById('brightnessSlider');
    const valDisplay = document.getElementById('valDisplay');

    // Helper to send data over Serial
    async function sendCommand(value) {
      if (writer) {
        await writer.write(value + '\n');
      }
    }

    // Connect to Serial Port
    connectBtn.addEventListener('click', async () => {
      if ('serial' in navigator) {
        try {
          port = await navigator.serial.requestPort();
          await port.open({ baudRate: 9600 });

          textEncoder = new TextEncoderStream();
          writableStreamClosed = textEncoder.readable.pipeTo(port.writable);
          writer = textEncoder.writable.getWriter();

          alert('Connected to Arduino successfully!');
          
          // Enable controls
          connectBtn.disabled = true;
          disconnectBtn.disabled = false;
          onBtn.disabled = false;
          offBtn.disabled = false;
          slider.disabled = false;
        } catch (err) {
          console.error('Error connecting:', err);
          alert('Failed to connect: ' + err.message);
        }
      } else {
        alert('Web Serial API is not supported in this browser.');
      }
    });

    // Disconnect from Serial Port
    disconnectBtn.addEventListener('click', async () => {
      if (port) {
        try {
          if (writer) {
            await sendCommand(0); // Turn off LED on disconnect
            writer.releaseLock();
          }

          await textEncoder.readable.cancel();
          await writableStreamClosed.catch(() => {});
          await port.close();

          port = null;
          writer = null;
          isLedOn = false;

          alert('Disconnected from Arduino.');

          // Reset UI state
          connectBtn.disabled = false;
          disconnectBtn.disabled = true;
          onBtn.disabled = true;
          offBtn.disabled = true;
          slider.disabled = true;
        } catch (err) {
          console.error('Error disconnecting:', err);
          alert('Failed to disconnect: ' + err.message);
        }
      }
    });

    // Turn LED ON (Uses current slider value)
    onBtn.addEventListener('click', async () => {
      isLedOn = true;
      const currentBrightness = slider.value;
      await sendCommand(currentBrightness);
    });

    // Turn LED OFF
    offBtn.addEventListener('click', async () => {
      isLedOn = false;
      await sendCommand(0);
    });

    // Adjust Brightness Slider
    slider.addEventListener('input', async () => {
      const value = slider.value;
      valDisplay.textContent = value;

      // Only update the live hardware LED brightness if the LED is currently turned ON
      if (isLedOn) {
        await sendCommand(value);
      }
    });
  </script>
</body>
</html>
